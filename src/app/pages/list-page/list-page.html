<app-category-selection></app-category-selection>

<app-global-search
  (onSearchChange)="onSearchChange($event)"
></app-global-search>

@if (error(); as err) {
  <div class="error-banner">{{ err }}</div>
}

<div class="page-layout" [class.has-detail]="isDetailView()">
  <div class="list-area" [class.hidden-on-mobile]="isDetailView()">
    <app-resource-list
      [resources]="filteredResources()"
      [isLoading]="isLoading()"
      [title]="getCategoryLabel(currentCategory())"
      [isEmpty]="isEmpty()"
      [shrunk]="isDetailView()"
      (onItemSelect)="navigateToDetail($event)"
    ></app-resource-list>

    @if (!searchQuery().trim()) {
      @if (isLoading() || loadingMore()) {
        <div class="scroll-loading">Loading more...</div>
      } @else if (hasMoreData()) {
        <div class="scroll-sentinel" appInViewport (onIntersect)="loadMore()"></div>
      } @else if (resources().length > 0) {
        <div class="scroll-end">You've reached the bottom :)</div>
      }
    }
  </div>

  <div class="detail-panel">
    <router-outlet />
  </div>
</div>
