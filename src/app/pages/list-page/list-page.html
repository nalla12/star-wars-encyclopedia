<app-category-selection></app-category-selection>

<app-global-search
  (onSearchChange)="onSearchChange($event)"
></app-global-search>

@if (error(); as err) {
  <div class="error-banner">{{ err }}</div>
}

<div class="page-layout" [class.has-detail]="isDetailView()">
  <div class="list-area" [class.hidden-on-mobile]="isDetailView()">
    <app-resource-list
      [resources]="filteredResources()"
      [isLoading]="isLoading()"
      [title]="getCategoryLabel(currentCategory())"
      [isEmpty]="isEmpty()"
      [shrunk]="isDetailView()"
      (onItemSelect)="navigateToDetail($event)"
    ></app-resource-list>

    @if (!searchQuery().trim()) {
      @if (isLoading() || loadingMore()) {
        <div class="scroll-loading">Loading more...</div>
      } @else if (hasMoreData()) {
        <div class="scroll-sentinel" appInViewport (onIntersect)="loadMore()"></div>
      } @else if (resources().length > 0) {
        <div class="scroll-end">You've reached the bottom :)</div>
      }
    }
  </div>

  <div class="detail-panel" [class.open]="isDetailView()">
    <div class="detail-backdrop" (click)="closeDetail()"></div>
    <div class="detail-sheet">
      <div class="sheet-handle" (click)="closeDetail()"></div>
      <router-outlet />
    </div>
    <button class="close-button" (click)="closeDetail()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>
