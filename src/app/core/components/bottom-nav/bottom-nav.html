<nav class="bottom-nav">
  @for (cat of categories; track cat) {
    <a
      class="nav-btn"
      [routerLink]="'/' + cat"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        @for (d of getCategoryIconPaths(cat); track $index) {
          <path [attr.d]="d" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        }
      </svg>
      <span class="nav-label">{{ getCategoryLabel(cat) }}</span>
    </a>
  }
</nav>
