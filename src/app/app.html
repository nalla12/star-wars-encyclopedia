<app-mobile-header
  [currentCategory]="currentCategory()"
  (onSelectCategory)="selectCategory($event)"
></app-mobile-header>

<app-category-selection
  [currentCategory]="currentCategory()"
  (onSelectCategory)="selectCategory($event)"
></app-category-selection>

<app-global-search
  (onSearchChange)="onSearchChange($event)"
></app-global-search>

@if (error(); as err) {
  <div class="error-banner">{{ err }}</div>
}

<app-resource-list
  [resources]="filteredResources()"
  [isLoading]="isLoading()"
  [title]="getCategoryLabel(currentCategory())"
  [isEmpty]="isEmpty()"
  (onItemSelect)="navigateToDetail($event)"
></app-resource-list>

<router-outlet />
